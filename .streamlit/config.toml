# DeepValue AI — dark fintech theme (OLED-friendly navy/black with green accents).
# Native Streamlit theme tokens; finer styling lives in app/theme.py.
[theme]
base = "dark"
primaryColor = "#22C55E"            # green — BUY / positive / CTA
backgroundColor = "#020617"         # app canvas (deep navy-black)
secondaryBackgroundColor = "#0F172A" # cards, sidebar, inputs
textColor = "#F8FAFC"               # near-white body text
font = "sans serif"

[server]
maxUploadSize = 10
